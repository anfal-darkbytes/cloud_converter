{% extends 'base.html' %}
{% block cloudConverterBody %}
<div class="gap-8 container mx-auto justify-center py-8">
    <div class="flex gap-8 container mx-auto justify-between py-4 px-[14%] text-[#A92655] text-[28px] font-bold">
        <h1>CONTACT US</h1>
        {% if done %}
        <p class="text-green-500 text-[16px] self-center">Message has been sent</p>
        {% elif error %}
        <p class="text-red-500 text-[16px] self-center">{{error}}</p>
        {% endif %}
    </div>
    <div class="gap-8 container mx-auto justify-center px-[14%] text-[18px]">
        <p>Please use the contact form below.</p>
    </div>
    <div class="bg-white w-[72%] justify-self-center border border-[#f2f2f2] rounded-sm border-b-2 container my-4">
        <div>
            <h1 class="text-black opacity-[.7] font-[600] text-[16px] px-8 py-8">CONTACT</h1>
        </div>
        <div class="px-8">
            <form id="contact-form" class="gap-4" method="POST">
                {% csrf_token %}
                <div class="flex gap-4">
                    <label class="text-[12px] py-4 block" for="name">Name</label>
                    <input type="text" id="name" name="name"
                           class="container my-2 py-2 px-4 border-1 border-[#f2f2f2] rounded-[8px] outline-none bg-white"
                           required>
                    <label class="text-[12px] py-4" for="email">Email</label>
                    <input type="email" id="email" name="email"
                           class="container my-2 py-2 px-4 bg-white border-1 border-[#f2f2f2] rounded-[8px] outline-none"
                           required><br>
                    <label class="text-[12px] py-4" for="subject">Subject</label>
                    <input type="text" id="subject" name="subject"
                           class="container my-2 py-2 px-4 bg-white border-1 border-[#f2f2f2] rounded-[8px] outline-none"
                           required><br>
                </div>
                <div class="py-4">
                    <label class="text-[12px] py-4" for="comment">Enter your message:</label>
                    <textarea id="comment" name="comment" rows="5" cols="50" class="container my-2 py-2 px-4 bg-white
                    border-1 border-[#f2f2f2] rounded-[8px] outline-none">
                    </textarea>
                </div>
                <div class="flex flex-row-reverse">
                    <button type="submit" id='button2' class="flex self-items-right justify-center gap-2 text-xl
                    text-white w-[150px] border border-white rounded-md my-2 py-2 bg-[#A92655]">Submit</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
