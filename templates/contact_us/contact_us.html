{% extends 'base.html' %}
{% block cloudConverterBody %}
<div class="gap-8 container mx-auto justify-center py-8">
    <div
            class="flex container mx-auto justify-between gap-4 py-2 px-[10%] md:gap-8 md:py-4 md:px-[14%] text-[#A92655] md:text-[28px] font-bold">
        <h1>CONTACT US</h1>
        {% if request.GET.done %}
        <p class="text-green-500 text-[14px] self-center">Message has been sent</p>
        {% elif request.GET.error %}
        <p class="text-red-500 text-[14px] self-center">{{request.GET.error}}</p>
        {% endif %}
    </div>
    <div class="md:gap-8 gap-4 px-[10%] text-[12px] container mx-auto justify-center md:px-[14%] md:text-[18px]">
        <p>Please use the contact form below.</p>
    </div>
    <div class="bg-white w-[90%] justify-self-center border border-[#f2f2f2] rounded-sm border-b-2 container my-4">
        <div class="px-4 md:px-8">
            <form id="contact-form" class="gap-4" method="POST">
                {% csrf_token %}
                <div class="md:flex gap-4">
                    <label class="text-[12px] py-4 block" for="name">Name</label>
                    <input type="text" id="name" name="name"
                           class="container my-2 py-2 px-4 border-1 border-[#f2f2f2] rounded-[8px] outline-none bg-white"
                           required>
                    <label class="text-[12px] py-4" for="email">Email</label>
                    <input type="email" id="email" name="email"
                           class="container my-2 py-2 px-4 bg-white border-1 border-[#f2f2f2] rounded-[8px] outline-none"
                           required><br>
                    <label class="text-[12px] py-4" for="subject">Subject</label>
                    <input type="text" id="subject" name="subject"
                           class="container my-2 py-2 px-4 bg-white border-1 border-[#f2f2f2] rounded-[8px] outline-none"
                           required><br>
                </div>
                <div class="py-2">
                    <label class="text-[12px] py-4" for="content">Enter your message:</label>
                    <textarea id="content" name="content" rows="5" cols="50" class="container my-2 py-2 px-4 bg-white
                    border-1 border-[#f2f2f2] rounded-[8px] outline-none">
                    </textarea>
                </div>
                <div class="flex flex-row-reverse">
                    <button type="submit" id='button2' class="flex self-items-right justify-center gap-2 md:text-xl
                    text-white w-[150px] border border-white rounded-md my-2 py-2 bg-[#A92655]">Submit</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
