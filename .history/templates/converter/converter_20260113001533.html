{% extends 'base.html' %}
{% block cloudConverterBody %}

<!-- Converter Header -->
<div class="bg-gradient-to-r from-[#242424] to-[#3a3a3a] py-12 text-center">
    <h1 class="text-white text-3xl font-bold">
        Convert {{ from_ext|upper }} to {{ to_ext|upper }}
    </h1>
</div>

<!-- Conversion Card -->
<div class="flex justify-center my-10">
    <div class="w-[600px] bg-white shadow-lg rounded-lg p-8">

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Upload Again -->
            <div class="mb-4">
                <label class="font-semibold block mb-2">Upload File</label>
                <input type="file" name="file" required class="border p-2 w-full">
            </div>

            <!-- Target Format -->
            <div class="mb-4">
                <label class="font-semibold block mb-2">Convert To</label>
                {{ form.target_format }}
            </div>

            <button class="bg-[#b53836] text-white px-8 py-3 rounded-md w-full">
                Convert File
            </button>
        </form>

        {% if output_file %}
            <div class="mt-6 text-center">
                <a href="/media/{{ output_file }}"
                   download
                   class="text-red-700 font-bold text-lg">
                    ⬇ Download Converted File
                </a>
            </div>
        {% endif %}
    </div>
</div>

{% endblock %}
